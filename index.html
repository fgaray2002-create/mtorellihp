<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Libro Interactivo - Versión Debug</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>
   
    <style>
        body { 
            background: #1a1a1a; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif;
        }
        #libro { 
            width: 800px; 
            height: 500px; 
            border: 2px solid #444;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            background: white;
        }
        .page { 
            width: 400px; 
            height: 500px; 
            background: white;
        }
        .page img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        .info {
            color: #0f0;
            margin: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2 style="color:white;">Libro Interactivo - Modo Debug</h2>
    
    <div id="libro">
        <div class="page"><img src="img1.jpg" alt="1"></div>
        <div class="page"><img src="img2.jpg" alt="2"></div>
        <div class="page"><img src="img3.jpg" alt="3"></div>
        <div class="page"><img src="img4.jpg" alt="4"></div>
        <div class="page"><img src="img5.jpg" alt="5"></div>
        <!-- Agrega más páginas aquí si querés probar. Por ahora con 8-10 está bien para testear -->
        <div class="page"><img src="img36.jpg" alt="36"></div>
    </div>

    <div class="info">
        Estado: <span id="status">Cargando...</span><br>
        Usa las esquinas para girar • Flechas ← → del teclado
    </div>

    <audio id="reproductor" loop></audio>

    <script>
        $(window).on('load', function() {

            console.log("✅ Documento cargado completamente");

            const libro = $("#libro");
            const status = $("#status");

            // Inicialización básica de turn.js
            libro.turn({
                width: 800,
                height: 500,
                pages: 36,          // Cambia esto si tenés menos imágenes por ahora
                autoCenter: true,
                display: 'double',
                gradients: true,
                acceleration: true,
                elevation: 50
            });

            console.log("✅ Turn.js inicializado");
            status.text("Listo - Intenta girar las páginas");

            // Evento turned (solo para debug)
            libro.bind("turned", function(event, page, view) {
                console.log(`Página girada → Página actual: ${page} | Vistas:`, view);
            });

            // Naveg
